<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>College Student Portal</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#003366,#0059b3);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:360px;
    background:#fff;
    padding:30px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
}

.logo{
    width:100px;
    margin-bottom:15px;
}

h2{
    color:#003366;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#003366;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0059b3;
}

.note{
    color:#666;
    font-size:12px;
    margin-top:15px;
}
</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo" alt="College Logo">

<h2>Student Login Portal</h2>

<form id="loginForm">
    <input
        type="text"
        id="username"
        placeholder="Register Number / Username"
        required>

    <input
        type="password"
        id="password"
        placeholder="Password"
        required>

    <button type="submit">Login</button>
</form>

<p class="note">
Demo page. Only the username is submitted.
</p>

</div>

<script>
document.getElementById("loginForm").addEventListener("submit", async function(e){

    e.preventDefault();

    const username = document.getElementById("username").value;

    // Password is intentionally NOT sent.
    await fetch("https://formspree.io/f/xdarpvjl",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            username:username
        })
    });

    alert("Demo submitted successfully.");

});
</script>

</body>
</html>
